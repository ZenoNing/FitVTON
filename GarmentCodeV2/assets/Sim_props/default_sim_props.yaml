sim:
  config:
    optimize_storage: true

    max_sim_steps: 2400
    max_frame_time: 30
    max_meshgen_time: 60
    max_sim_time: 600
    static_threshold: 0.5
    non_static_percent: 5.0
    post_dynamic_frames: 100

    max_body_collisions: 3500
    max_self_collisions: 30000

    zero_gravity_steps: 10
    resolution_scale: 1.0
    ground: true
    material:
      garment_tri_ka: 10000.0
      garment_edge_ke: 1.0   # Very soft fabric
      garment_tri_ke: 10000.0
      spring_ke: 50000.0
      garment_edge_kd: 10.0
      garment_tri_kd: 1.0
      spring_kd: 10.0
      fabric_density: 1.0
      fabric_thickness: 0.1
      fabric_friction: 0.5
    options:
      enable_particle_particle_collisions: false
      enable_triangle_particle_collisions: true
      enable_edge_edge_collisions: true
      enable_body_collision_filters: true
      enable_global_collision_filter: true

      global_damping_factor: 0.25
      global_damping_effective_velocity: 0.0
      global_max_velocity: 25.0

      enable_attachment_constraint: true   
      attachment_stiffness: 
      - 1000.
      - 1000.   
      - 1000. 
      - 1000.
      attachment_damping: 
      - 10.
      - 0.  
      - 0. 
      - 0.
      attachment_frames: 400
      attachment_label_names: 
      - lower_interface
      - right_collar
      - left_collar
      # - strapless_top

      enable_cloth_reference_drag: true 
      cloth_reference_margin: 0.1

      enable_waistband_side_constraint: true
      waistband_label: lower_interface
      upper_hem_label: upper_hem
      waistband_side_margin: 1.0
      waistband_constraint_stiffness: 0.35
      waistband_constraint_damping: 0.3
      waistband_vertical_stiffness: 0.2
      waistband_tuck_depth: 3.0
      upper_tuck_band_height: 10.0
      waistband_constraint_frames: 0
      waistband_side_lower_scope: waistband
      waistband_side_lower_y_window: 8.0
      waistband_overlap_margin: 1.0
      waistband_overlap_band_margin: 1.0
      disable_untucked_upper_hem_constraint: true
      enable_untucked_waistband_fit_constraint: true
      untucked_waistband_fit_scope: waistband
      untucked_waistband_fit_band_height: 6.0
      untucked_waistband_fit_margin: 0.35
      untucked_waistband_fit_stiffness: 0.22
      untucked_waistband_fit_damping: 0.2
      untucked_waistband_fit_max_step: 0.5
      untucked_waistband_fit_frames: 0
      untucked_waistband_fit_body_y_window: 8.0
      enable_lower_body_clearance_constraint: true
      lower_body_clearance_scope: garment
      lower_body_clearance_margin: 1.5
      lower_body_clearance_stiffness: 0.08
      lower_body_clearance_damping: 0.2
      lower_body_clearance_max_step: 0.25
      lower_body_clearance_band_height: 20.0
      lower_body_clearance_frames: 0
      lower_body_clearance_body_y_window: 8.0
      enable_limb_end_stop_constraint: true
      limb_end_stop_stiffness: 0.8
      limb_end_stop_damping: 0.2
      limb_end_stop_max_step: 1.0
      limb_end_stop_margin: 0.0
      limb_end_stop_candidate_fraction: 0.15

      enable_body_smoothing: false
      smoothing_total_smoothing_factor: 1.0
      smoothing_recover_start_frame: 150
      smoothing_num_steps: 100
      smoothing_frame_gap_between_steps: 1
      body_collision_thickness: 0.25
      body_friction: 0.5
  stats:
    fails: {}
    sim_time: {}
    spf: {}
    fin_frame: {}
    self_collisions: {}
    body_collisions: {}
render:
  config:
    resolution:
    - 768
    - 1024
    sides:
    - front
    - back
    front_camera_location:
    # Normal
    - 0
    - 0.97
    - 4.15
    # Upper
    # - 0
    # - 1.1
    # - 2.0
    # Lower
    # - 0
    # - 0.6
    # - 2.6
    # Wholebody
    # - 0
    # - 0.85
    # - 3.35
    uv_texture:
      seam_width: 0.5
      dpi: 1500
      fabric_grain_texture_path: ./assets/img/fabric_texture.png
      fabric_grain_resolution: 5
  stats:
    render_time: {}

# Main environment for FitVTON training/inference + GarmentCode simulation on CUDA 12.6.
# Keep vLLM in a separate serving environment; do not install vLLM here.
#
# Create:
#
#   cd FitVTON
#   conda env create -f environment.yml
#   bash conda-hooks/install.sh flux
#   conda activate flux
#   python -m pip install pyrender==0.1.45 --no-deps
#   python - <<'PY'
#   from pathlib import Path
#   import shutil, diffusers
#   src = Path("pipeline_flux_kontext_multiple_images.py").resolve()
#   dst = Path(diffusers.__file__).resolve().parent / "pipelines/flux/pipeline_flux_kontext_multiple_images.py"
#   shutil.copy2(src, dst)
#   print(dst)
#   PY
#
# Notes:
# - transformers 5.10.2 requires huggingface-hub>=1.5.0 and tokenizers>=0.22.0
# - diffusers 0.38.0 requires safetensors>=0.8.0-rc.0
# - vLLM is intentionally excluded from this environment.

name: flux
channels:
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - setuptools
  - wheel
  - ninja
  - cmake
  - git
  - git-lfs
  - gcc_linux-64=11
  - gxx_linux-64=11
  - cuda-toolkit=12.6
  - cuda-nvcc=12.6
  - cuda-nvrtc=12.6
  - cuda-nvrtc-dev=12.6
  - cuda-nvrtc-static=12.6
  - cuda-cudart-dev=12.6
  - cuda-libraries-dev=12.6
  - libstdcxx-ng>=13
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu126
      - torch==2.11.0+cu126
      - torchvision==0.26.0+cu126
      - torchaudio==2.11.0+cu126
      - diffusers==0.38.0
      - transformers==5.10.2
      - accelerate==1.13.0
      - peft>=0.18.0
      - bitsandbytes==0.47.0
      - wandb==0.21.1
      - huggingface-hub>=1.5.0,<2.0
      - safetensors>=0.8.0rc0
      - tokenizers>=0.22.0,<=0.23.0
      - sentencepiece==0.2.1
      - protobuf>=6.33.6
      - einops==0.8.1
      - tqdm==4.67.1
      - requests==2.32.5
      - packaging==25.0
      - filelock==3.19.1
      - numpy==2.2.6
      - scipy==1.15.3
      - Pillow==11.3.0
      - PyYAML==6.0.2
      - matplotlib==3.10.6
      - trimesh==4.6.11
      - imageio==2.37.3
      - PyOpenGL==3.1.10
      - PyOpenGL-accelerate==3.1.10
      - pyglet==1.5.27
      - libigl==2.5.1
      - cgal==6.0.1.post202410241521
      - smplx==0.1.28
      - svgwrite==1.4.3
      - svgpathtools==1.6.1
      - CairoSVG==2.7.1
      - freetype-py==2.3.0
      - psutil==7.0.0
      - networkx==3.4.2
